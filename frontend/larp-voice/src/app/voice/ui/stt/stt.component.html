<app-top-nav-bar
  brandName="Escriba"
  subtitle="Voz a texto"
  (profileClick)="openProfile()"
  (settingsClick)="openSettings()"
></app-top-nav-bar>

<main class="container main">
  <div class="toolHeader">
    <button class="back btn-reset kbd-focus" type="button" (click)="back()">
      ← Volver
    </button>

    <div class="toolTitle">
      <div class="title">Voz a texto</div>
      <div class="subtitle">Panel STT</div>
    </div>
  </div>

  <!-- UI STT (la que ya tenías) -->
  <section class="panel">
    <div class="panel__header">
      <h2>Voz a texto</h2>
      <div class="hint">Graba y transcribe al instante.</div>
    </div>

    <div class="row">
      <button class="btn" type="button" (click)="startRecording()" [disabled]="isRecording">
        Grabar
      </button>

      <button class="btn btn--ghost" type="button" (click)="stopRecording()" [disabled]="!isRecording">
        Detener
      </button>

      <span class="status" *ngIf="sttStatus">{{ sttStatus }}</span>
    </div>

    <div class="box">
      <label>Transcripción</label>
      <textarea rows="4" readonly [value]="transcribedText"></textarea>
      <div class="error" *ngIf="sttError">{{ sttError }}</div>
    </div>
  </section>
</main>

<app-right-drawer
  [open]="drawerOpen"
  [title]="drawerTitle"
  width="420px"
  (close)="closeDrawer()"
>
  <app-profile-panel *ngIf="mode === 'profile'"></app-profile-panel>
  <app-settings-panel *ngIf="mode === 'settings'"></app-settings-panel>
</app-right-drawer>
