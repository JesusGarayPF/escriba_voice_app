<app-top-nav-bar
  brandName="Escriba"
  subtitle="Texto a voz"
  (profileClick)="openProfile()"
  (settingsClick)="openSettings()"
></app-top-nav-bar>

<main class="container main">
  <div class="toolHeader">
    <button class="back btn-reset kbd-focus" type="button" (click)="back()">
      ← Volver
    </button>

    <div class="toolTitle">
      <div class="title">Texto a voz</div>
      <div class="subtitle">Panel TTS</div>
    </div>
  </div>

  <!-- UI TTS (la que ya tenías) -->
  <section class="panel">
    <div class="panel__header">
      <h2>Texto a voz</h2>
      <div class="hint">Convierte texto en audio.</div>
    </div>

    <div class="box">
      <label>Texto</label>
      <textarea
        rows="4"
        [(ngModel)]="text"
        (ngModelChange)="session.setString('tts.lastText', $event)"
        placeholder="Escribe aquí..."
      ></textarea>
    </div>

    <div class="row">
      <button class="btn" type="button" (click)="speakText()">Reproducir</button>
      <span class="status" *ngIf="ttsStatus">{{ ttsStatus }}</span>
    </div>

    <div class="error" *ngIf="ttsError">{{ ttsError }}</div>

    <audio class="player" *ngIf="ttsAudioUrl" [src]="ttsAudioUrl" controls></audio>
  </section>
</main>

<app-right-drawer
  [open]="drawerOpen"
  [title]="drawerTitle"
  width="420px"
  (close)="closeDrawer()"
>
  <app-profile-panel *ngIf="mode === 'profile'"></app-profile-panel>
  <app-settings-panel *ngIf="mode === 'settings'"></app-settings-panel>
</app-right-drawer>
