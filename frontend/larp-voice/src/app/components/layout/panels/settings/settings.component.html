<div class="card">
  <div class="group">
    <div class="label">Idioma</div>
    <select class="control kbd-focus" [(ngModel)]="model.language">
      <option value="es">Español</option>
      <option value="en">English</option>
    </select>
  </div>

  <div class="group">
    <div class="label">Transcripción</div>

    <label class="toggle">
      <input type="checkbox" [(ngModel)]="model.autoScroll" />
      <span>Auto-scroll</span>
    </label>
  </div>

  <div class="group">
    <div class="label">Audio</div>

    <label class="toggle">
      <input type="checkbox" [(ngModel)]="model.autoPlayTTS" />
      <span>No reproducir automáticamente TTS</span>
    </label>

    <div class="note">Recomendado para evitar audio inesperado.</div>
  </div>
</div>
