<div class="overlay" *ngIf="open" (click)="onOverlayClick()" aria-hidden="true"></div>

<aside class="drawer" [class.drawer--open]="open" [style.width]="width" role="dialog"
    [attr.aria-label]="title || 'Panel'" [attr.aria-modal]="open ? 'true' : null">
    
    <div class="drawer__panel" (click)="stop($event)" #panel>
        <header class="drawer__header">
            <div class="drawer__title">{{ title }}</div>

            <button class="close-btn btn-reset kbd-focus" type="button" (click)="close.emit()">
                <span class="sr-only">Cerrar</span>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                        d="M18.3 5.7a1 1 0 0 0-1.4 0L12 10.6 7.1 5.7a1 1 0 0 0-1.4 1.4l4.9 4.9-4.9 4.9a1 1 0 1 0 1.4 1.4l4.9-4.9 4.9 4.9a1 1 0 0 0 1.4-1.4l-4.9-4.9 4.9-4.9a1 1 0 0 0 0-1.4Z" />
                </svg>
            </button>
        </header>

        <section class="drawer__body">
            <ng-content></ng-content>
        </section>

        <footer class="drawer__footer" *ngIf="false">
            <!-- Footer opcional si lo necesitas -->
        </footer>
    </div>
</aside>
